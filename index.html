<!doctype html>

      .text-sky {

      .bg-sky {

  <body class="bg-white text-slate-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
     
          <nav
            className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? "glass py-3" : "bg-transparent py-5"}`}
          >

                </a>

                    "Basic Analytics",
                    "Trebo Domain",

                  price: "5,000",

        const faqs = [

            q: "How do I get paid?",
            a: "Orders are sent to your WhatsApp. You can share your account details or payment links (like Paystack/Flutterwave) directly with the customer there.",

                      <Minus className="w-5 h-5 text-sky" />
                    ) : (
                      <Plus className="w-5 h-5 text-slate-400" />
                    )}
                  </button>
                  <AnimatePresence>
                    {open === i && (
                      <motion.div
                        initial={{ height: 0 }}
                        animate={{ height: "auto" }}
                        exit={{ height: 0 }}
                        className="overflow-hidden"
