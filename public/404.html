<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Trebo Void</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0F;
            --violet: #7B2FFF;
            --cyan: #00F5FF;
            --coral: #FF4D6D;
            --font-display: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: var(--font-display);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.3;
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-100vh) translateX(20px); }
        }

        /* Container */
        main {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 900px;
        }

        /* Glitch 404 */
        .hero-code {
            font-size: 22vw;
            font-weight: 700;
            line-height: 1;
            position: relative;
            cursor: pointer;
            user-select: none;
            color: #fff;
            text-transform: uppercase;
        }

        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--cyan);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--coral);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim-2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            5% { clip: rect(70px, 9999px, 71px, 0); }
            10% { clip: rect(29px, 9999px, 83px, 0); }
            15% { clip: rect(80px, 9999px, 91px, 0); }
            20% { clip: rect(50px, 9999px, 100px, 0); }
            25% { clip: rect(20px, 9999px, 40px, 0); }
            30% { clip: rect(60px, 9999px, 80px, 0); }
            100% { clip: rect(60px, 9999px, 80px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            5% { clip: rect(52px, 9999px, 54px, 0); }
            10% { clip: rect(11px, 9999px, 26px, 0); }
            15% { clip: rect(85px, 9999px, 98px, 0); }
            100% { clip: rect(85px, 9999px, 98px, 0); }
        }

        /* Robot */
        .astronaut-container {
            height: 120px;
            margin-bottom: -20px;
            animation: drift 6s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes drift {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Typography */
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--cyan);
            margin-bottom: 3rem;
            min-height: 1.5em;
        }

        /* Button */
        .btn-wrap {
            position: relative;
            display: inline-block;
        }

        .btn {
            background: #fff;
            color: var(--bg);
            padding: 1.2rem 2.5rem;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 0;
            display: inline-block;
            transition: background 0.3s;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn:hover {
            background: var(--cyan);
        }

        .ripple {
            position: absolute;
            background: rgba(255,255,255,0.4);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
            animation: ripple-effect 0.6s linear;
        }

        @keyframes ripple-effect {
            from { width: 0; height: 0; opacity: 1; }
            to { width: 500px; height: 500px; opacity: 0; }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            .glitch::before, .glitch::after, .astronaut-container, .particle, .hero-code {
                animation: none !important;
                clip: none !important;
            }
        }

        @media (max-width: 768px) {
            .hero-code { font-size: 30vw; }
            h1 { font-size: 1.5rem; }
        }

        /* Trebo branding */
        .trebo-logo {
            position: fixed;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #fff;
        }

        .logo-box {
            width: 24px;
            height: 24px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-weight: 900;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="particles" id="particle-field"></div>

    <a href="/" class="trebo-logo">
        <div class="logo-box">t</div>
        <span style="font-weight: 800; letter-spacing: -0.5px;">trebo</span>
    </a>

    <main>
        <div class="astronaut-container" id="astronaut">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z" fill="var(--cyan)"/>
                <path d="M12 6C9.79 6 8 7.79 8 10V12C8 14.21 9.79 16 12 16C14.21 16 16 14.21 16 12V10C16 7.79 14.21 6 12 6ZM14 12C14 13.1 13.1 14 12 14C10.9 14 10 13.1 10 12V10C10 8.9 10.9 8 12 8C13.1 8 14 8.9 14 10V12Z" fill="var(--cyan)"/>
                <circle cx="12" cy="11" r="1" fill="var(--violet)"/>
            </svg>
        </div>

        <div class="hero-code glitch" data-text="404" id="code-404">404</div>
        
        <h1>You've drifted into the void.</h1>
        <p class="subtitle" id="typewriter"></p>

        <div class="btn-wrap">
            <button class="btn btn-magnetic" onclick="window.location.href='/'">
                Return to Surface
            </button>
        </div>
    </main>

    <script>
        // Particle Field
        const field = document.getElementById('particle-field');
        for(let i = 0; i < 80; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = `${Math.random() * 100}vw`;
            p.style.top = `${Math.random() * 100}vh`;
            p.style.animationDuration = `${Math.random() * 10 + 10}s`;
            p.style.animationDelay = `${Math.random() * -20}s`;
            field.appendChild(p);
        }

        // Typewriter
        const text = "> Searching for catalog... [FAILED] | Connection lost in deep space.";
        const target = document.getElementById('typewriter');
        let i = 0;
        function type() {
            if (i < text.length) {
                target.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 50);
            }
        }
        setTimeout(type, 1000);

        // Magnetic Button
        const btn = document.querySelector('.btn-magnetic');
        document.addEventListener('mousemove', (e) => {
            const rect = btn.getBoundingClientRect();
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            const btnX = rect.left + rect.width / 2;
            const btnY = rect.top + rect.height / 2;
            
            const dist = Math.hypot(mouseX - btnX, mouseY - btnY);
            
            if (dist < 150) {
                const x = (mouseX - btnX) * 0.3;
                const y = (mouseY - btnY) * 0.3;
                btn.style.transform = `translate3d(${x}px, ${y}px, 0)`;
            } else {
                btn.style.transform = `translate3d(0, 0, 0)`;
            }
        });

        // Click Ripple & Confetti
        btn.addEventListener('click', function(e) {
            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;
            let ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });

        // Easter Egg
        const code = document.getElementById('code-404');
        code.addEventListener('click', () => {
            document.body.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';
            setTimeout(() => document.body.style.animation = '', 500);
            
            for(let i=0; i<20; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.innerText = ['🚀', '✨', '🛸', '🛰️', '💎'][Math.floor(Math.random()*5)];
                c.style.left = '50vw';
                c.style.top = '50vh';
                c.style.fontSize = '24px';
                document.body.appendChild(c);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 15 + 10;
                let vx = Math.cos(angle) * velocity;
                let vy = Math.sin(angle) * velocity;
                
                let opacity = 1;
                function anim() {
                    let left = parseFloat(c.style.left);
                    let top = parseFloat(c.style.top);
                    c.style.left = (left + vx) + 'px';
                    c.style.top = (top + vy) + 'px';
                    vy += 0.5; // gravity
                    opacity -= 0.02;
                    c.style.opacity = opacity;
                    if(opacity > 0) requestAnimationFrame(anim);
                    else c.remove();
                }
                anim();
            }
        });

        const style = document.createElement('style');
        style.innerHTML = `@keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }`;
        document.head.appendChild(style);

        // Parallax drift
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) * 0.01;
            const y = (e.clientY - window.innerHeight / 2) * 0.01;
            document.getElementById('astronaut').style.transform = `translate3d(${x}px, ${y}px, 0)`;
        });
    </script>
</body>
</html>
